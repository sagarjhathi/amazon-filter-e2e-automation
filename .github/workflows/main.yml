name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    - cron: "50 17 * * *"   # 11:20 PM IST daily

permissions:
  contents: write   # ✅ allow pushing index.html back to repo

env:
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION: 24
  WORKDIR: eclipse-workspace/Intro
  ARTIFACT_RETENTION_DAYS: 7

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 300
    env:
      REPORT_BASE: "/amazon-filter-e2e-automation/"
      IS_CRON: ${{ github.event_name == 'schedule' }}  # <-- "true" only for cron
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true   # ✅ ensures GITHUB_TOKEN is kept for pushing

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache Maven target and .m2 repo (optional)
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ${{ env.WORKDIR }}/target
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Print environment info
        shell: bash
        run: |
          echo "Java version:"
          java -version
          echo "Maven version:"
          mvn -v
          echo "Working directory: ${{ env.WORKDIR }}"
          echo "Runner OS: $RUNNER_OS"

      - name: Notify Discord – Start of Test
        if: always()
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          runUrl="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          timestamp=$(TZ='Asia/Kolkata' date +"%Y-%m-%d %I:%M %p IST")
          actor="${{ github.actor }}"
          branch="${{ github.ref_name }}"
          job_name="${{ github.job }}"

          curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"**CI Test Started - $job_name**\\n Triggered by: $actor\\n Branch: $branch\\n Start Time: $timestamp\\n [View Run]($runUrl)\"}" "$DISCORD_WEBHOOK"


      - name: Set RUN_TIMESTAMP (Windows runner)
        id: set_ts
        shell: pwsh
        run: |
          # produce format yyyy-MM-dd_HH-mm-ss (matches local format)
          $ts = Get-Date -Format 'yyyy-MM-dd_HH-mm-ss'
          Write-Host "RUN_TIMESTAMP = $ts"
          # export to GITHUB_ENV for subsequent steps
          Add-Content -Path $env:GITHUB_ENV -Value "RUN_TIMESTAMP=$ts"


      - name: Build project
        run: mvn clean compile
        working-directory: ${{ env.WORKDIR }}


      - name: Run Maven Tests
        working-directory: ${{ env.WORKDIR }}
        run: mvn test
        continue-on-error: true
       

      - name: Find latest run folder
        id: find_run
        shell: pwsh
        run: |
          $runFolder = Get-ChildItem -Path "${{ env.WORKDIR }}" -Directory -Filter "run_*" |
                       Sort-Object LastWriteTime -Descending |
                       Select-Object -First 1
      
          echo "RUN_FOLDER=$($runFolder.Name)" >> $env:GITHUB_ENV


      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ env.RUN_FOLDER }}_amazon-filter-e2e-automation
          path: ${{ env.WORKDIR }}/${{ env.RUN_FOLDER }}
          retention-days: 30


      - name: Save artifacts
        shell: pwsh
        run: |
          $tempPath = "$env:RUNNER_TEMP\artifacts"
          $run = $env:RUN_FOLDER
      
          New-Item -ItemType Directory -Path $tempPath -Force
          Remove-Item -Recurse -Force "$tempPath/$run" -ErrorAction SilentlyContinue
      
          Copy-Item -Recurse -Force "${{ env.WORKDIR }}/$run" "$tempPath/"



      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages


      - name: Clean gh-pages
        shell: pwsh
        run: |
          Get-ChildItem -Force | Where-Object { $_.Name -ne '.git' } | Remove-Item -Recurse -Force


      - name: Restore artifacts
        shell: pwsh
        run: |
          $tempPath = "$env:RUNNER_TEMP\artifacts"
          $run = $env:RUN_FOLDER
      
          Copy-Item -Recurse -Force "$tempPath/$run" "."


      - name: Create index
        shell: pwsh
        run: |
          $run = $env:RUN_FOLDER
          $reportPath = "$run/reports/ExtentReport.html"
      
          $content = "<meta http-equiv='refresh' content='0; url=$reportPath'>"
          Set-Content -Path index.html -Value $content


      - name: Deploy
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      
          git add .
          git commit -m "Update report" || echo "No changes"
          git push origin gh-pages --force